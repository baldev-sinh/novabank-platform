server:
  port: 8081

spring:
  application:
    name: novabank-auth-service

  sql:
    init:
      mode: never

  datasource:
    url: jdbc:postgresql://localhost:5432/novabank_auth
    username: postgres
    password: postgres

    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000


  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

security:
  jwt:
    issuer: novabank-auth-service
    secret: 01234567890123456789012345678901
    expiration: 900


management:
  endpoints:
    web:
      exposure:
        include: health, info

logging:
  level:
    root: INFO
